log:
  debug: true

mysql:
  dsn: "root:root@tcp(localhost:13316)/task?charset=utf8mb4&collation=utf8mb4_general_ci&parseTime=True&loc=Local&timeout=1s&readTimeout=3s&writeTimeout=3s&multiStatements=true"

redis:
  addr: "localhost:6379"

mq:
  kafka:
    network: "tcp"
    addr: "localhost:9092"

etcd:
  addrs:
    - "127.0.0.1:2379"
  connectTimeout: "1s"
  secure: false

cache:
  local:
    capacity: 1000000
  requestTimeout: 3000000000
  valueExpiration: 600000000000

prometheus:
  url: "http://localhost:9090"

server:
  scheduler:
    grpc:
      host: "0.0.0.0"
      port: 9002
  governor:
    host: "0.0.0.0"
    port: 9003
  executor:
    grpc:
      host: "0.0.0.0"
      port: 9004

scheduler:
  batchTimeout: 3000000000
  batchSize: 100
  preemptedTimeout: 600000000000 # 10m
  scheduleInterval: 10000000000
  renewInterval: 5000000000
  maxConcurrentTasks: 1000
  tokenAcquireTimeout: 3000000000
  pollInterval: 1000000000
  reportTimeout: 10000000000

# 负载检查器配置
loadChecker:
  limiter:
    rateLimit: 10.0           # 每秒允许10次调度
    burstSize: 20             # 突发容量20
    waitDuration: 5000000000  # 限流时等待5秒
  database:
    threshold: 100000000       # 数据库响应时间阈值100ms
    timeWindow: 300000000000  # 查询时间窗口5分钟
    backoffDuration: 10000000000  # 负载过高时退避10秒
  cluster:
    thresholdRatio: 1.2       # 超过平均值20%触发降频
    timeWindow: 300000000000  # 查询时间窗口5分钟
    slowdownMultiplier: 2.0   # 降频乘数，睡眠时间加倍
    minBackoffDuration: 5000000000  # 最小退避时间5秒

compensator:
  retry:
    maxRetryCount: 3
    prepareTimeoutWindowMs: 10000000000
    batchSize: 100
    minDuration: 1000000000
  reschedule:
    batchSize: 100
    minDuration: 1000000000
  sharding:
    batchSize: 100
    minDuration: 1000000000

executionReportEvent:
  topic: "execution_report"
  partitions: 1

executionBatchReportEvent:
  topic: "execution_batch_report"
  partitions: 1